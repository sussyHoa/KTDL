<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AI FAKE NEWS CYBER-SCANNER</title>
    <style>
        body {
            background-color: #050811;
            color: #00f2fe;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .scanner-container {
            text-align: center;
            width: 600px;
            background: rgba(17, 24, 39, 0.8);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #00f2fe;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
        }
        .search-box {
            width: 100%;
            padding: 15px;
            background: #0b0f19;
            border: 2px solid #374151;
            border-radius: 30px;
            color: #fff;
            font-size: 16px;
            outline: none;
            text-align: center;
            transition: all 0.3s;
        }
        .search-box:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
        }
        .btn-scan {
            margin-top: 20px;
            padding: 12px 40px;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            border: none;
            border-radius: 25px;
            color: #050811;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
        }
        /* Hiệu ứng Radar xoay khi đang quét cực ngầu */
        .radar {
            display: none;
            width: 80px;
            height: 80px;
            border: 4px solid #00f2fe;
            border-radius: 50%;
            border-top-color: transparent;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .result-card {
            display: none;
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="scanner-container">
    <h1 style="text-shadow: 0 0 10px #00f2fe;">🛡️ CYBER-SCANNER AI</h1>
    <p style="color: #6b7280;">Hệ thống kiểm định tin giả</p>
    
    <div style="margin: 20px 0;">
        <label><input type="radio" name="type" value="url" checked> Dán Link URL</label>
        <label style="margin-left: 20px;"><input type="radio" name="type" value="text"> Dán Văn Bản</label>
    </div>

    <input type="text" id="inputData" class="search-box" placeholder="Nhập mục tiêu phân tích vào đây...">
    <button class="btn-scan" onclick="startScan()">KÍCH HOẠT QUÉT SÂU</button>
    
    <div id="radar" class="radar"></div>
    <div id="result" class="result-card"></div>
</div>

<script>
    async function startScan() {
        const inputData = document.getElementById('inputData').value;
        const type = document.querySelector('input[name="type"]:checked').value;
        const radar = document.getElementById('radar');
        const result = document.getElementById('result');
        
        if(!inputData) return alert("Vui lòng nhập dữ liệu!");
        
        radar.style.display = 'block';
        result.style.display = 'none';
        
        try {
            const response = await fetch('http://127.0.0.1:8000/api/scan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ type: type, content: inputData })
            });
            const data = await response.json();
            
            radar.style.display = 'none';
            result.style.display = 'block';
            
            if(data.status === "REAL") {
                result.style.background = "rgba(16, 185, 129, 0.2)";
                result.style.border = "1px solid #10b981";
                result.style.color = "#10b981";
                result.innerHTML = `AN TOÀN: TIN THẬT (Độ tin cậy: ${data.confidence}%)`;
            } else {
                result.style.background = "rgba(239, 68, 68, 0.2)";
                result.style.border = "1px solid #ef4444";
                result.style.color = "#ef4444";
                result.innerHTML = `CẢNH BÁO: TIN GIẢ (Độ nghi ngờ: ${data.confidence}%)`;
            }
        } catch (err) {
            radar.style.display = 'none';
            alert("Lỗi kết nối đến máy chủ AI!");
        }
    }
</script>
</body>
</html>
